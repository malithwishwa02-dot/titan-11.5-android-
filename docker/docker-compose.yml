version: "3.8"
# Titan V11.3 — Antidetect Device Platform (Cuttlefish)
# Host networking for minimal latency. Resource limits to prevent throttle.
# Cuttlefish VMs are managed via launch_cvd/stop_cvd by the API's DeviceManager.

services:
  # ═══════════════════════════════════════════════════════════════════
  # TITAN API SERVER — FastAPI + 16 router modules + middleware
  # ═══════════════════════════════════════════════════════════════════
  titan-api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.titan-api-prod
    container_name: titan-api
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/titan/data:/opt/titan/data
      - /usr/bin/adb:/usr/bin/adb
      - ../console:/opt/titan/console
      - ../core:/opt/titan/core
      - ../server:/opt/titan/server
      - ${TITAN_RELEASE:-/root/titan-v11-release/core}:/opt/titan/v11-core:ro
    env_file:
      - ../.env
    environment:
      - TITAN_DATA=/opt/titan/data
      - TITAN_GPU_URL=${TITAN_GPU_URL:-http://127.0.0.1:8765}
      - TITAN_API_SECRET=${TITAN_API_SECRET:-}
      - CVD_BIN_DIR=${CVD_BIN_DIR:-/opt/titan/cuttlefish/cf/bin}
      - CVD_HOME_BASE=${CVD_HOME_BASE:-/opt/titan/cuttlefish}
      - CVD_IMAGES_DIR=${CVD_IMAGES_DIR:-/opt/titan/cuttlefish/images}
      - PYTHONPATH=/opt/titan/server:/opt/titan/core:/opt/titan/v11-core
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ═══════════════════════════════════════════════════════════════════
  # WS-SCRCPY — H264 device screen streaming + multi-touch
  # ═══════════════════════════════════════════════════════════════════
  ws-scrcpy:
    image: scavin/ws-scrcpy:latest
    container_name: titan-scrcpy
    restart: unless-stopped
    network_mode: host
    volumes:
      - /usr/bin/adb:/usr/bin/adb
      - /root/.android:/root/.android
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ═══════════════════════════════════════════════════════════════════
  # NGINX — Reverse proxy + SSL + security headers + gzip
  # ═══════════════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: titan-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - titan-api
      - ws-scrcpy

  # ═══════════════════════════════════════════════════════════════════
  # SEARXNG — Self-hosted search (for Intelligence/Dark Web tabs)
  # ═══════════════════════════════════════════════════════════════════
  searxng:
    image: searxng/searxng:latest
    container_name: titan-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    volumes:
      - searxng-data:/etc/searxng

volumes:
  searxng-data:
